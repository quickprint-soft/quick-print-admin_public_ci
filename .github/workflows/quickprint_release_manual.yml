name: CI

on:
  repository_dispatch:
    types:
      - quick-print-admin_public_ci
  push:
    branches: [ '*' ]
  pull_request:
  # release:
  #   types: [ created, edited ]
  workflow_dispatch:
    inputs:
      gva_version:
        required: true
        type: string

permissions:
  contents: write
  actions: write

env:
  GH_TOKEN: ${{ github.token }}
  GITHUB_TOKEN: ${{ github.token }}
  ZIP_PASSWORD: ${{ secrets.ZIP_PASSWORD }}
  DDING_SECRET: ${{ secrets.DDING_SECRET }}
  DDING_TOKEN: ${{ secrets.DDING_TOKEN }}
  DOWNLOAD_PROXY: ${{ secrets.DOWNLOAD_PROXY }}
jobs:
  init:
    if: github.repository_owner == 'quickprint-soft'
    runs-on: ubuntu-latest
    steps:
      - name: init
        run: |
          echo "quickprint-soft"


  frontend:
    if: github.event_name == 'push' || github.event_name == 'pull_request' || github.event_name == 'release' || github.event_name == 'repository_dispatch' || github.event_name == 'workflow_dispatch'
    name: Frontend node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.16.0]
    steps:
      - name: Check out branch
        uses: actions/checkout@v6

      - name: Clone myutils
        run: |
          git clone https://oauth2:${{ secrets.CHARLES_GITHUB_TOKEN  }}@github.com/charlessoft/myutils.git ./myutils


      - name: Install dding on non-Windows
        if: runner.os != 'Windows'
        env:
          DDING_SECRET_INPUT: ${{ github.event.client_payload.dding_secret || env.DDING_SECRET }}
          DDING_TOKEN_INPUT: ${{ github.event.client_payload.dding_token || env.DDING_TOKEN }}
        run: |
          pip install dding
          if [ -n "$DDING_SECRET_INPUT" ] && [ -n "$DDING_TOKEN_INPUT" ]; then
            mkdir -p ~/.dding
            printf '[\n  {\n    "group": "default",\n    "secret": "%s",\n    "token": "%s"\n  }\n]\n' "$DDING_SECRET_INPUT" "$DDING_TOKEN_INPUT" > ~/.dding/config.json
          else
            echo "Skipping dding config: DDING_SECRET/DDING_TOKEN not set"
          fi
          
          
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}


      - name: Get current branch name
        id: get_branch
        run: |
          echo "BRANCH=$(git rev-parse --abbrev-ref HEAD)" >> $GITHUB_ENV
          echo "BOOTSTRAP_UTILS_DIR=${PWD}/myutils" >> $GITHUB_ENV
          echo "UTILS_DIR=${PWD}/quick-print-admin/myutils" >> $GITHUB_ENV
          echo "WORK_ROOT_DIR=${PWD}/quick-print-admin" >> $GITHUB_ENV
          echo "==========="
          echo $(git rev-parse --abbrev-ref HEAD)
          echo "==========="

      - name: Prepare quickprint-admin workspace
        env:
          MYUSER_TOKEN: ${{ secrets.MYUSER_TOKEN }}
        run: |
          echo "export BRANCH=$BRANCH" > ./myutils/.clone_code.env
          echo "export UTILS_DIR=$BOOTSTRAP_UTILS_DIR" >> ./myutils/.clone_code.env
          cat ./myutils/.clone_code.env
          bash ./myutils/quickprint/scripts/clone_code.sh ./myutils/.clone_code.env

      - name: Generate JENKINS.env
        run: |
          echo "export BRANCH=$BRANCH " >> $WORK_ROOT_DIR/.JENKINS.env
          echo "export UTILS_DIR=$UTILS_DIR" >> $WORK_ROOT_DIR/.JENKINS.env
          echo "export WORK_ROOT_DIR=$WORK_ROOT_DIR" >> $WORK_ROOT_DIR/.JENKINS.env
          cat $WORK_ROOT_DIR/.JENKINS.env
        working-directory: ./quick-print-admin

      - name: Generate git commit
        run: |
           bash $WORK_ROOT_DIR/myutils/quickprint/scripts/build_web.sh $WORK_ROOT_DIR/.JENKINS.env

      - name: Build test
        run: |
          npm install
          npm run build
        working-directory: ./quick-print-admin/web


        
      - name: Set SSH
        env:
          KEY: ${{ secrets.SSH_KEY }}
        run: |
          mkdir -p ~/.ssh/ && echo "$KEY" > ~/.ssh/id_rsa && chmod 600 ~/.ssh/id_rsa
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      # - name: Setup Debug Session
      #   uses: csexton/debugger-action@master

      - name: publish web
        run: |
          # echo ${{ env.branch_name }} 
          # echo "export BRANCH=${{ env.branch_name }} " >> .JENKINS.env
          # find . -name "publish_web.sh"
          # echo "================="
          # cat .JENKINS.env
          bash $WORK_ROOT_DIR/myutils/quickprint/scripts/publish_web.sh $WORK_ROOT_DIR/.JENKINS.env

  backend:
    if: github.event_name == 'push' || github.event_name == 'pull_request' || github.event_name == 'release' || github.event_name == 'repository_dispatch' || github.event_name == 'workflow_dispatch'
    name: Backend go
    runs-on: macos-latest
    strategy:
      matrix:
        go-version: [1.23.9]
    steps:
      - name: Set up Go ${{ matrix.go-version }}
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
        id: go

      - name: Check out branch
        uses: actions/checkout@v6


      - name: Clone myutils
        run: |
          git clone https://oauth2:${{ secrets.CHARLES_GITHUB_TOKEN  }}@github.com/charlessoft/myutils.git ./myutils
          


      - name: Get current branch name
        id: get_branch
        run: |
          echo "BRANCH=$(git rev-parse --abbrev-ref HEAD)" >> $GITHUB_ENV
          echo "BOOTSTRAP_UTILS_DIR=${PWD}/myutils" >> $GITHUB_ENV
          echo "UTILS_DIR=${PWD}/quick-print-admin/myutils" >> $GITHUB_ENV
          echo "WORK_ROOT_DIR=${PWD}/quick-print-admin" >> $GITHUB_ENV
          echo "==========="
          echo $(git rev-parse --abbrev-ref HEAD)
          echo "==========="

      - name: Prepare quickprint-admin workspace
        env:
          MYUSER_TOKEN: ${{ secrets.MYUSER_TOKEN }}
        run: |
          echo "export BRANCH=$BRANCH" > ./myutils/.clone_code.env
          echo "export UTILS_DIR=$BOOTSTRAP_UTILS_DIR" >> ./myutils/.clone_code.env
          cat ./myutils/.clone_code.env
          bash ./myutils/quickprint/scripts/clone_code.sh ./myutils/.clone_code.env

      - name: Generate JENKINS.env
        run: |
          echo "export BRANCH=$BRANCH " >> $WORK_ROOT_DIR/.JENKINS.env
          echo "export UTILS_DIR=$UTILS_DIR" >> $WORK_ROOT_DIR/.JENKINS.env
          echo "export WORK_ROOT_DIR=$WORK_ROOT_DIR" >> $WORK_ROOT_DIR/.JENKINS.env
          cat $WORK_ROOT_DIR/.JENKINS.env
        working-directory: ./quick-print-admin


      - name: Download dependencies
        run: |
          make build-server-local
        working-directory: ./quick-print-admin

      - name: Build agent
        run: |
          bash ./quick-print-admin/myutils/quickprint/scripts/build_agent.sh $WORK_ROOT_DIR/.JENKINS.env

      # - name: Download dependencies
      #   run: |
      #     go get -v -t -d ./...
      #     if [ -f Gopkg.toml ]; then
      #         curl https://raw.githubusercontent.com/golang/dep/master/install.sh | sh
      #         dep ensure
      #     fi
      #   working-directory: ./quick-print-admin/server

      # - name: Test and Build
      #   run: |
      #     go build -v -race
      #     make 
      #     mv server quickprintserver && tar zcvf quickprintserver.tar.gz quickprintserver ./config.yaml ./resource 
      #   working-directory: ./quick-print-admin/




      - name: Set SSH
        env:
          KEY: ${{ secrets.SSH_KEY }}
        run: |
          mkdir -p ~/.ssh/ && echo "$KEY" > ~/.ssh/id_rsa && chmod 600 ~/.ssh/id_rsa
          ssh-keyscan github.com >> ~/.ssh/known_hosts






      - name: publish server
        run: |
          bash ./quick-print-admin/myutils/quickprint/scripts/publish_server.sh $WORK_ROOT_DIR/.JENKINS.env

      - name: publish agent
        run: |
          bash ./quick-print-admin/myutils/quickprint/scripts/publish_agent.sh $WORK_ROOT_DIR/.JENKINS.env



  deploy:
      if: github.event_name == 'push' || github.event_name == 'pull_request' || github.event_name == 'release' || github.event_name == 'repository_dispatch' || github.event_name == 'workflow_dispatch'
      name:  deploy
      runs-on: ubuntu-latest
      needs:
        - init
        - backend
        - frontend
      steps:
        - name: Check out branch
          uses: actions/checkout@v6
  
        - name: Clone myutils
          run: |
            git clone https://oauth2:${{ secrets.CHARLES_GITHUB_TOKEN  }}@github.com/charlessoft/myutils.git ./myutils
  
  
        - name: Install dding on non-Windows
          if: runner.os != 'Windows'
          env:
            DDING_SECRET_INPUT: ${{ github.event.client_payload.dding_secret || env.DDING_SECRET }}
            DDING_TOKEN_INPUT: ${{ github.event.client_payload.dding_token || env.DDING_TOKEN }}
          run: |
            pip install dding
            if [ -n "$DDING_SECRET_INPUT" ] && [ -n "$DDING_TOKEN_INPUT" ]; then
              mkdir -p ~/.dding
              printf '[\n  {\n    "group": "default",\n    "secret": "%s",\n    "token": "%s"\n  }\n]\n' "$DDING_SECRET_INPUT" "$DDING_TOKEN_INPUT" > ~/.dding/config.json
            else
              echo "Skipping dding config: DDING_SECRET/DDING_TOKEN not set"
            fi
  
  
        - name: Get current branch name
          id: get_branch
          run: |
            echo "BRANCH=$(git rev-parse --abbrev-ref HEAD)" >> $GITHUB_ENV
            echo "BOOTSTRAP_UTILS_DIR=${PWD}/myutils" >> $GITHUB_ENV
            echo "UTILS_DIR=${PWD}/quick-print-admin/myutils" >> $GITHUB_ENV
            echo "WORK_ROOT_DIR=${PWD}/quick-print-admin" >> $GITHUB_ENV
            echo "==========="
            echo $(git rev-parse --abbrev-ref HEAD)
            echo "==========="

        - name: Prepare quickprint-admin workspace
          env:
            MYUSER_TOKEN: ${{ secrets.MYUSER_TOKEN }}
          run: |
            echo "export BRANCH=$BRANCH" > ./myutils/.clone_code.env
            echo "export UTILS_DIR=$BOOTSTRAP_UTILS_DIR" >> ./myutils/.clone_code.env
            cat ./myutils/.clone_code.env
            bash ./myutils/quickprint/scripts/clone_code.sh ./myutils/.clone_code.env
  
        - name: Generate JENKINS.env
          run: |
            echo "export BRANCH=$BRANCH " >> $WORK_ROOT_DIR/.JENKINS.env
            echo "export UTILS_DIR=$UTILS_DIR" >> $WORK_ROOT_DIR/.JENKINS.env
            echo "export WORK_ROOT_DIR=$WORK_ROOT_DIR" >> $WORK_ROOT_DIR/.JENKINS.env
            cat $WORK_ROOT_DIR/.JENKINS.env
          working-directory: ./quick-print-admin
  
  
        - name: Set SSH
          env:
            KEY: ${{ secrets.SSH_KEY }}
            # HOST: ${{ secrets.HOST }}
            # USER: ${{ secrets.USER }}
            # PROT: ${{ secrets.PROT }}
            # MKDIRTEST: ${{ secrets.MKDIRTEST }}
          run: |
            mkdir -p ~/.ssh/ && echo "$KEY" > ~/.ssh/id_rsa && chmod 600 ~/.ssh/id_rsa
            ssh-keyscan github.com >> ~/.ssh/known_hosts
            
        - name: Deploy 
          run: |
            bash $WORK_ROOT_DIR/myutils/quickprint/scripts/quickprint/docker_deploy.sh $WORK_ROOT_DIR/.JENKINS.env



        - name: Check Status
          if: ${{ success() }}
          shell: pwsh
          run: |
            $repoName = $env:GITHUB_REPOSITORY.Split('/')[-1]
            
            Write-Host "Workflow succeeded for $repoName!"
            if (Test-Path "$HOME/.dding/config.json") {
              dding "github action success :) for quickprint"
            } else {
              Write-Host "Skipping dding notification: config not found"
            }
          

        - name: Check Status
          if: ${{ failure() }}
          shell: pwsh
          run: |
            $repoName = $env:GITHUB_REPOSITORY.Split('/')[-1]
            Write-Host "Workflow failed for $repoName!"
            if (Test-Path "$HOME/.dding/config.json") {
              dding "github action fail :( quickprint"
            } else {
              Write-Host "Skipping dding notification: config not found"
            }

  cleanup:
      if: always()
      name: cleanup old workflow runs
      runs-on: ubuntu-latest
      needs:
        - init
        - backend
        - frontend
        - deploy
      steps:
        - name: Delete older completed runs for this workflow
          uses: actions/github-script@v8
          with:
            script: |
              const owner = context.repo.owner;
              const repo = context.repo.repo;
              const workflowId = 'quickprint_release_manual.yml';
              const currentRunId = context.runId;

              const { data: currentRun } = await github.rest.actions.getWorkflowRun({
                owner,
                repo,
                run_id: currentRunId,
              });

              const runs = await github.paginate(github.rest.actions.listWorkflowRuns, {
                owner,
                repo,
                workflow_id: workflowId,
                per_page: 100,
              });

              const currentCreatedAt = new Date(currentRun.created_at);
              const staleRuns = runs.filter((run) => {
                if (run.id === currentRunId) {
                  return false;
                }
                if (run.status !== 'completed') {
                  return false;
                }
                return new Date(run.created_at) < currentCreatedAt;
              });

              core.info(`Deleting ${staleRuns.length} old completed workflow runs`);

              for (const run of staleRuns) {
                core.info(`Deleting run ${run.id} created at ${run.created_at}`);
                await github.rest.actions.deleteWorkflowRun({
                  owner,
                  repo,
                  run_id: run.id,
                });
              }
